<!-- Modal Organism -->
<div
  id="[[id]]"
  class="hs-overlay pointer-events-none fixed start-0 top-0 z-[80] hidden size-full overflow-y-auto overflow-x-hidden"
  role="dialog"
  tabindex="-1"
  aria-labelledby="[[id]]-title"
>
  <div class="m-3 mt-16 opacity-0 transition-all hs-overlay-open:mt-10 hs-overlay-open:opacity-100 [[sizeClass]]">
    <div class="pointer-events-auto rounded-3xl border border-slate-800 bg-slate-950 p-5 shadow-2xl shadow-black/50">
      <div class="flex items-start justify-between gap-4">
        <div>
          <h3 id="[[id]]-title" class="text-base font-extrabold">[[title]]</h3>
          <p class="mt-1 text-sm text-slate-300">[[description]]</p>
        </div>
        <button
          type="button"
          class="inline-flex items-center justify-center rounded-2xl border border-slate-800 bg-slate-950 p-2 text-slate-200 hover:bg-slate-900"
          aria-label="Close"
          data-hs-overlay="#[[id]]"
        >
          <svg class="size-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
            <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
        </button>
      </div>

      <div class="mt-4">
        [[content]]
      </div>

      <div class="mt-5 flex justify-end gap-2">
        [[actions]]
      </div>
    </div>
  </div>
</div>
