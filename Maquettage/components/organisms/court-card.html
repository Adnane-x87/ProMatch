<!-- Court Card Organism -->
<article class="group rounded-3xl border border-slate-800 bg-slate-950/60 p-5 hover:border-primary/60">
  <div class="flex items-start justify-between">
    <div class="[[iconWrapperClass]]">[[icon]]</div>
    [[badge]]
  </div>
  <h3 class="mt-4 text-base font-extrabold">[[title]]</h3>
  <p class="mt-1 text-sm text-slate-300">[[description]]</p>
  <div class="mt-4 flex items-center justify-between">
    <div class="text-sm font-extrabold text-primary">
      [[price]] <span class="text-xs font-semibold text-slate-400">/ heure</span>
    </div>
    [[button]]
  </div>
</article>
