<!-- Navbar Organism -->
<header class="sticky top-0 z-50 border-b border-slate-800/70 bg-slate-950/70 backdrop-blur">
  <nav class="mx-auto flex max-w-7xl items-center justify-between gap-3 px-4 py-3 sm:px-6">
    [[logo]]
    
    <div class="flex items-center gap-2">
      <!-- Desktop Navigation -->
      <div class="hidden items-center gap-1 md:flex">
        [[navLinks]]
      </div>

      <!-- Dropdown -->
      [[dropdown]]

      <!-- Mobile Toggle -->
      <button
        type="button"
        class="hs-collapse-toggle inline-flex items-center justify-center rounded-xl border border-slate-800 bg-slate-950 p-2 text-slate-200 hover:bg-slate-900 md:hidden"
        data-hs-collapse="#[[collapseId]]"
        aria-controls="[[collapseId]]"
        aria-label="Toggle navigation"
      >
        <svg class="hs-collapse-open:hidden size-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
          <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg>
        <svg class="hs-collapse-open:block hidden size-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
          <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg>
      </button>
    </div>
  </nav>

  <!-- Mobile Menu -->
  <div id="[[collapseId]]" class="hs-collapse hidden md:hidden">
    <div class="mx-auto max-w-7xl px-4 pb-3 sm:px-6">
      <div class="pm-glass rounded-2xl p-3">
        [[mobileLinks]]
      </div>
    </div>
  </div>
</header>
