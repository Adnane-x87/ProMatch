<!-- Accordion Item Organism -->
<div class="hs-accordion [[activeClass]] rounded-3xl border border-slate-800 bg-slate-950/60" id="[[id]]">
  <button
    class="hs-accordion-toggle flex w-full items-center justify-between gap-4 rounded-3xl px-5 py-4 text-left text-sm font-extrabold text-slate-100 hover:bg-slate-900/40"
    aria-controls="[[id]]-collapse"
  >
    [[question]]
    <svg class="size-5 text-slate-400 hs-accordion-active:rotate-180 transition" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
      <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
    </svg>
  </button>
  <div
    id="[[id]]-collapse"
    class="hs-accordion-content [[collapseClass]] w-full overflow-hidden transition-[height] duration-300"
    aria-labelledby="[[id]]"
  >
    <div class="px-5 pb-5 text-sm text-slate-300">
      [[answer]]
    </div>
  </div>
</div>
